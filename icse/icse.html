<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICSE 2026 — Personalized Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8FAFC; --card-bg: #FFFFFF; --border: #E5E7EB; --accent: #2563EB;
  --text-primary: #0F172A; --text-secondary: #64748B; --slot-bg: #EFF6FF; --rationale-bg: #F9FAFB;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0F172A; --card-bg: #1E293B; --border: #334155; --accent: #60A5FA;
    --text-primary: #F1F5F9; --text-secondary: #94A3B8; --slot-bg: #1E293B; --rationale-bg: #1E293B;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text-primary); }
.container { max-width: 780px; margin: 0 auto; padding: 16px 12px; min-height: 100vh; }
.header { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
.header p { font-size: 12.5px; color: var(--text-secondary); margin-top: 4px; line-height: 1.4; }
.day-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
.day-tab { flex: 1; padding: 10px 8px; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer;
  border: 1.5px solid var(--border); background: var(--card-bg); color: var(--text-primary);
  font-family: inherit; transition: all 0.15s; text-align: center; }
.day-tab.active { border: 2px solid var(--accent); background: var(--accent); color: white; }
.day-tab .sub { font-size: 10px; font-weight: 500; opacity: 0.85; margin-top: 1px; }
.filters { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-bottom: 12px; }
.filter-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-right: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.filter-btn { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer;
  border: 1px solid #E5E7EB; background: white; color: #9CA3AF; font-family: inherit; transition: all 0.12s; }
.filter-btn.active-highlight { border: 1.5px solid #D97706; background: #FFFBEB; color: #B45309; }
.filter-btn.active-clear { border: 1px solid #FCA5A5; background: #FEF2F2; color: #DC2626; }
.slot-header { font-size: 13px; font-weight: 700; color: var(--accent); padding: 6px 10px; background: var(--slot-bg);
  border-radius: 6px; margin-bottom: 6px; letter-spacing: -0.01em; border-left: 3px solid var(--accent); }
.slot-group { margin-bottom: 16px; }
.pick-card { padding: 10px 14px; margin-bottom: 6px; border-radius: 8px; background: var(--card-bg);
  border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; position: relative; }
.pick-card:hover { box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.pick-card.upc { background: #FEF2F2; border: 2px solid #DC2626; }
.pick-card.highlight { background: #FFFBEB; border: 1.5px solid #F59E0B; }
.pick-card.upc.highlight { background: #FEF2F2; border: 2px solid #DC2626; }
.upc-badge { position: absolute; top: 0; right: 12px; background: #DC2626; color: white; font-size: 10px;
  font-weight: 800; padding: 1px 8px 2px; border-radius: 0 0 4px 4px; letter-spacing: 0.05em; }
.pick-row { display: flex; gap: 10px; align-items: flex-start; }
.pick-time { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; font-size: 13px; font-weight: 700;
  color: var(--accent); min-width: 42px; padding-top: 1px; }
.pick-card.upc .pick-time { color: #DC2626; }
.pick-body { flex: 1; min-width: 0; }
.pick-title { font-size: 13.5px; font-weight: 600; color: var(--text-primary); line-height: 1.35; margin-bottom: 3px; }
.pick-meta { font-size: 11.5px; color: var(--text-secondary); margin-bottom: 4px; }
.pick-meta strong { font-weight: 600; }
.tags { display: flex; flex-wrap: wrap; gap: 2px; }
.tag { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px; font-weight: 600;
  margin-right: 4px; margin-bottom: 2px; line-height: 18px; letter-spacing: 0.01em; }
.rationale { margin-top: 8px; padding: 8px 10px; background: var(--rationale-bg); border-radius: 6px;
  font-size: 12.5px; color: var(--text-secondary); line-height: 1.5; border-left: 3px solid var(--accent); display: none; }
.pick-card.upc .rationale { background: #FFF5F5; border-left-color: #DC2626; }
.rationale.open { display: block; }
.award-star { color: #D97706; margin-right: 4px; }
.must-diamond { color: #D97706; margin-right: 4px; }
.empty-msg { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 14px; }
.footer { text-align: center; padding: 20px 0 8px; font-size: 11px; color: #94A3B8; line-height: 1.5; }
</style>
</head>

const TAG_COLORS={"agentic-SE":{bg:"#FEE2E2",text:"#991B1B",border:"#FECACA"},"multi-agent":{bg:"#FEE2E2",text:"#991B1B",border:"#FECACA"},"education":{bg:"#DBEAFE",text:"#1E40AF",border:"#BFDBFE"},"empirical":{bg:"#FEF3C7",text:"#92400E",border:"#FDE68A"},"AI4SE":{bg:"#E0E7FF",text:"#3730A3",border:"#C7D2FE"},"SE4AI":{bg:"#EDE9FE",text:"#5B21B6",border:"#DDD6FE"},"learning-analytics":{bg:"#D1FAE5",text:"#065F46",border:"#A7F3D0"},"interpretability":{bg:"#FCE7F3",text:"#9D174D",border:"#FBCFE8"},"requirements":{bg:"#FFF7ED",text:"#9A3412",border:"#FED7AA"},"SLR":{bg:"#FEF3C7",text:"#92400E",border:"#FDE68A"},"agile":{bg:"#D1FAE5",text:"#065F46",border:"#A7F3D0"},"teams":{bg:"#CCFBF1",text:"#134E4A",border:"#99F6E4"},"tech-debt":{bg:"#F3E8FF",text:"#6B21A8",border:"#E9D5FF"},"keynote":{bg:"#F1F5F9",text:"#334155",border:"#E2E8F0"},"award":{bg:"#FFFBEB",text:"#B45309",border:"#FDE68A"},"UPC":{bg:"#DC2626",text:"#FFFFFF",border:"#B91C1C"}};
const TAG_LABELS={"agentic-SE":"Agentic SE","multi-agent":"Multi-Agent","education":"SE Education","empirical":"Empirical SE","AI4SE":"AI for SE","SE4AI":"SE for AI","learning-analytics":"Learning Analytics","interpretability":"Interpretability","requirements":"Requirements","SLR":"Syst. Review","agile":"Agile","teams":"Teams","tech-debt":"Tech Debt","keynote":"Keynote","award":"Award","UPC":"UPC"};
const ALL_TAGS=["UPC","agentic-SE","multi-agent","empirical","AI4SE","SE4AI","interpretability","requirements","education","learning-analytics","teams","agile","tech-debt","SLR","keynote","award"];

let state = { activeDay: "Wednesday", activeTags: new Set(), showHighlightsOnly: false };

function makeTag(tag) {
  const c = TAG_COLORS[tag] || {bg:"#F3F4F6",text:"#374151",border:"#E5E7EB"};
  return `<span class="tag" style="background:${c.bg};color:${c.text};border:1px solid ${c.border}">${TAG_LABELS[tag]||tag}</span>`;
}

function render() {
  const dayData = SCHEDULE[state.activeDay] || [];
  const filtered = dayData.map(slot => ({
    ...slot,
    picks: slot.picks.filter(p => {
      if (state.showHighlightsOnly && !p.highlight && !p.upc) return false;
      if (state.activeTags.size === 0) return true;
      return p.tags.some(t => state.activeTags.has(t));
    })
  })).filter(s => s.picks.length > 0);

  const totalPicks = filtered.reduce((s,sl) => s + sl.picks.length, 0);
  const days = ["Wednesday","Thursday","Friday"];
  const dayLabels = {Wednesday:"Wed 15",Thursday:"Thu 16",Friday:"Fri 17"};

  let html = `<div class="header">
    <h1>ICSE 2026 — Personalized Schedule</h1>
    <p>${totalPicks} presentations shown · Tap any card for rationale · <span style="color:#DC2626;font-weight:700">UPC</span> = colleagues · ★ = Award · ◆ = Must-attend</p>
  </div>`;

  html += `<div class="day-tabs">`;
  for (const d of days) {
    const cnt = SCHEDULE[d].reduce((s,sl) => s + sl.picks.length, 0);
    const cls = d === state.activeDay ? "day-tab active" : "day-tab";
    html += `<button class="${cls}" onclick="setDay('${d}')">${dayLabels[d]}<div class="sub">${cnt} picks</div></button>`;
  }
  html += `</div>`;

  html += `<div class="filters"><span class="filter-label">Filter:</span>`;
  const hlCls = state.showHighlightsOnly ? "filter-btn active-highlight" : "filter-btn";
  html += `<button class="${hlCls}" onclick="toggleHighlights()">◆ Highlights + UPC</button>`;
  for (const tag of ALL_TAGS) {
    const active = state.activeTags.has(tag);
    const c = TAG_COLORS[tag];
    const style = active ? `border:1.5px solid ${c.border};background:${c.bg};color:${c.text}` : "";
    html += `<button class="filter-btn" style="${style}" onclick="toggleTag('${tag}')">${TAG_LABELS[tag]}</button>`;
  }
  if (state.activeTags.size > 0 || state.showHighlightsOnly) {
    html += `<button class="filter-btn active-clear" onclick="clearFilters()">✕ Clear</button>`;
  }
  html += `</div>`;

  if (filtered.length === 0) {
    html += `<div class="empty-msg">No presentations match the current filters</div>`;
  }
  for (const slot of filtered) {
    html += `<div class="slot-group"><div class="slot-header">${slot.slot}</div>`;
    for (let j = 0; j < slot.picks.length; j++) {
      const p = slot.picks[j];
      const isUPC = p.upc;
      const isHL = p.highlight && !isUPC;
      let cardCls = "pick-card";
      if (isUPC) cardCls += " upc";
      else if (p.highlight) cardCls += " highlight";
      const id = `pick-${state.activeDay}-${j}-${p.time.replace(':','')}`;

      let prefix = "";
      if (p.tags.includes("award")) prefix += '<span class="award-star">★</span>';
      if (isHL) prefix += '<span class="must-diamond">◆</span>';

      html += `<div class="${cardCls}" onclick="toggleRationale('${id}')">`;
      if (isUPC) html += `<div class="upc-badge">UPC</div>`;
      html += `<div class="pick-row">
        <span class="pick-time">${p.time}</span>
        <div class="pick-body">
          <div class="pick-title" ${isUPC?'style="padding-right:32px"':''}>${prefix}${p.title}</div>
          <div class="pick-meta">${p.session} · <strong>${p.track}</strong></div>
          <div class="tags">${p.tags.map(makeTag).join('')}</div>
          <div class="rationale" id="${id}"><strong>Why attend:</strong> ${p.why}</div>
        </div>
      </div></div>`;
    }
    html += `</div>`;
  }

  html += `<div class="footer">Focus: Research Track, agentic SE, multi-agent, empirical SE, AI4SE/SE4AI, interpretability, requirements<br>UPC colleagues: Xavier Franch, Matias Martinez, Silverio Martínez-Fernández, Joel Castaño Fernández</div>`;

  document.getElementById('app').innerHTML = html;
}

function setDay(d) { state.activeDay = d; render(); }
function toggleTag(t) { if (state.activeTags.has(t)) state.activeTags.delete(t); else state.activeTags.add(t); render(); }
function toggleHighlights() { state.showHighlightsOnly = !state.showHighlightsOnly; render(); }
function clearFilters() { state.activeTags.clear(); state.showHighlightsOnly = false; render(); }
function toggleRationale(id) { const el = document.getElementById(id); if (el) el.classList.toggle('open'); }

render();
</script>
</body>
</html>
